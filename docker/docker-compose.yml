services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 5s
      retries: 5

  broker:
    image: confluentinc/cp-kafka:7.5.0
    hostname: broker
    container_name: broker
    #    use broker:9092 inside docker, localhost:9092 for things accessing outside of container on the machine
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
#    this 29092 is an arbitrary port for host machine
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      - broker
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # Needed for metadata
  druid-postgres:
    image: postgres:latest
    container_name: druid-postgres
    environment:
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: druid
      POSTGRES_DB: druid
    ports:
      - "5432:5432"

  druid-router:
    image: apache/druid:28.0.0
    platform: linux/amd64
    container_name: druid-router
    command: router
    depends_on:
      - druid-coordinator
    ports:
      - "8888:8888"
    environment:
      - DRUID_XMS=2g
      - DRUID_XMX=2g
      - DRUID_MAXDIRECTMEMORYSIZE=6g
      - druid.zk.service.host=zookeeper:2181
      - druid.zk.paths.base=/druid
      - druid.extensions.loadList=["druid-postgresql-metadata-storage","druid-kafka-indexing-service"]

  druid-coordinator:
    image: apache/druid:28.0.0
    platform: linux/amd64
    container_name: druid-coordinator
    command: coordinator
    depends_on:
      - druid-postgres
    environment:
      - druid.port=8081
      - DRUID_METADATA_STORAGE_TYPE=postgresql
      - DRUID_METADATA_STORAGE_HOST=druid-postgres
      - DRUID_METADATA_STORAGE_DB=druid
      - DRUID_METADATA_STORAGE_USER=druid
      - DRUID_METADATA_STORAGE_PASSWORD=druid
      - DRUID_XMS=2g
      - DRUID_XMX=2g
      - DRUID_MAXDIRECTMEMORYSIZE=6g
      - druid.zk.service.host=zookeeper:2181
      - druid.zk.paths.base=/druid
      - druid.extensions.loadList=["druid-postgresql-metadata-storage","druid-kafka-indexing-service"]

  druid-overlord:
    image: apache/druid:28.0.0
    platform: linux/amd64
    container_name: druid-overlord
    command: overlord
    depends_on:
      - druid-postgres
    ports:
      - "8090:8090"
    environment:
      - druid.port=8090
      - DRUID_XMS=2g
      - DRUID_XMX=2g
      - DRUID_MAXDIRECTMEMORYSIZE=6g
      - druid.zk.service.host=zookeeper:2181
      - druid.zk.paths.base=/druid
      - druid.extensions.loadList=["druid-postgresql-metadata-storage","druid-kafka-indexing-service"]

  druid-broker:
    image: apache/druid:28.0.0
    platform: linux/amd64
    container_name: druid-broker
    command: broker
    environment:
      - druid.port=8082
      - DRUID_XMS=2g
      - DRUID_XMX=2g
      - DRUID_MAXDIRECTMEMORYSIZE=6g
      - druid.zk.service.host=zookeeper:2181
      - druid.zk.paths.base=/druid
      - druid.extensions.loadList=["druid-postgresql-metadata-storage","druid-kafka-indexing-service"]

  druid-historical:
    image: apache/druid:28.0.0
    platform: linux/amd64
    container_name: druid-historical
    command: historical
    depends_on:
      - druid-coordinator
      - druid-postgres
    volumes:
      - ./druid/segments:/opt/druid/segments
      - ./druid/cache:/opt/druid/segment-cache
    environment:
      - druid.port=8083
      - DRUID_XMS=1g
      - DRUID_XMX=1g
      - DRUID_MAXDIRECTMEMORYSIZE=2g
      - druid.storage.type=local
      - druid.storage.storageDirectory=/opt/druid/segments
      - druid.segmentCache.locations=[{"path":"/opt/druid/segment-cache","maxSize":1000000000}]
      - druid.zk.service.host=zookeeper:2181
      - druid.zk.paths.base=/druid
      - DRUID_METADATA_STORAGE_TYPE=postgresql
      - DRUID_METADATA_STORAGE_HOST=druid-postgres
      - DRUID_METADATA_STORAGE_DB=druid
      - DRUID_METADATA_STORAGE_USER=druid
      - DRUID_METADATA_STORAGE_PASSWORD=druid
      - druid.extensions.loadList=[]

  druid-middlemanager:
    image: apache/druid:28.0.0
    platform: linux/amd64
    container_name: druid-middlemanager
    command: middleManager
    volumes:
      - ./druid/segments:/opt/druid/segments
    environment:
      - druid.port=8091
      - druid.worker.capacity=2
      - DRUID_XMS=2g
      - DRUID_XMX=2g
      - DRUID_MAXDIRECTMEMORYSIZE=6g
      - druid.storage.type=local
      - druid.storage.storageDirectory=/opt/druid/segments
      - druid.zk.service.host=zookeeper:2181
      - druid.zk.paths.base=/druid
      - druid.extensions.loadList=["druid-postgresql-metadata-storage","druid-kafka-indexing-service"]
