services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 5s
      retries: 5

  broker:
    image: confluentinc/cp-kafka:7.5.0
    hostname: broker
    container_name: broker
    #    use broker:9092 inside docker, localhost:9092 for things accessing outside of container on the machine
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
#    this 29092 is an arbitrary port for host machine
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: W1lburgra!
      MYSQL_DATABASE: flink_test
      MYSQL_USER: flink
      MYSQL_PASSWORD: flink

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      - broker
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://broker:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  druid:
    image: apache/druid:latest
    container_name: druid
    ports:
      - "8888:8888" # Router/query UI
      - "8081:8081" # Coordinator
      - "8082:8082" # Broker
    environment:
      DRUID_MAXDIRECTMEMORYSIZE: 6g
      DRUID_XMX: 2g
      JAVA_OPTS: "-server -XX:+UseG1GC"
    volumes:
      - ./druid/conf:/druid/conf # Used for putting config for druid in for docker
      - ./druid/segments:/var/druid/segments #for configuring deep storage, flink will put stuff in /druid/segments